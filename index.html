<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Are You Blaming Yourself for a Rigged Game? | Holli McCormick</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #faf9f7;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .wrap {
    max-width: 640px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    box-shadow: 0 2px 20px rgba(0,0,0,0.07);
  }
  .brand {
    font-size: 12px;
    color: #888;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .intro-title {
    font-size: 28px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }
  .intro-sub {
    font-size: 16px;
    color: #555;
    line-height: 1.7;
    margin-bottom: 2rem;
  }
  .start-btn {
    display: inline-block;
    padding: 14px 36px;
    background: #534AB7;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .start-btn:hover { background: #3C3489; }
  .tagline {
    font-size: 13px;
    color: #999;
    margin-top: 1rem;
  }
  .prog-bg {
    background: #eeecfb;
    border-radius: 99px;
    height: 6px;
    margin-bottom: 2rem;
  }
  .prog-fill {
    background: #534AB7;
    height: 6px;
    border-radius: 99px;
    transition: width 0.3s ease;
  }
  .qlabel {
    font-size: 13px;
    color: #999;
    margin-bottom: 0.5rem;
  }
  .qtext {
    font-size: 18px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }
  .opt {
    display: block;
    width: 100%;
    text-align: left;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 2px solid #e0ddf5;
    border-radius: 12px;
    background: #faf9ff;
    color: #1a1a1a;
    font-size: 15px;
    cursor: pointer;
    line-height: 1.5;
    transition: all 0.15s;
    font-family: inherit;
  }
  .opt:hover { border-color: #7F77DD; background: #f0eeff; }
  .opt.sel {
    border-color: #534AB7;
    background: #EEEDFE;
    color: #26215C;
    font-weight: 500;
  }
  .opt.sel::before { content: "✓  "; color: #534AB7; font-weight: 700; }
  .navrow {
    display: flex;
    justify-content: space-between;
    margin-top: 1.5rem;
  }
  .nbtn {
    padding: 10px 22px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    background: #fff;
    color: #444;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .nbtn:hover { border-color: #999; }
  .nbtn.pri { background: #534AB7; color: #fff; border-color: #534AB7; }
  .nbtn.pri:hover { background: #3C3489; }
  .nbtn:disabled { opacity: 0.3; cursor: default; }
  .badge {
    display: inline-block;
    background: #EEEDFE;
    color: #3C3489;
    font-size: 12px;
    padding: 3px 12px;
    border-radius: 99px;
    margin-bottom: 1rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .rtitle {
    font-size: 26px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 0.5rem;
  }
  .rsub {
    font-size: 16px;
    color: #666;
    line-height: 1.7;
    margin-bottom: 1.5rem;
    font-style: italic;
  }
  .rbody {
    font-size: 15px;
    color: #333;
    line-height: 1.85;
    margin-bottom: 1rem;
  }
  .rcta {
    font-size: 16px;
    font-weight: 500;
    color: #1a1a1a;
    margin: 1rem 0 0.5rem;
  }
  .rfooter {
    font-size: 16px;
    color: #534AB7;
    font-weight: 600;
    margin-bottom: 2rem;
  }
  .divider {
    border: none;
    border-top: 1px solid #eee;
    margin: 2rem 0;
  }
  .esec {
    background: #f7f6fe;
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid #e0ddf5;
  }
  .elabel {
    font-size: 16px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 0.4rem;
  }
  .esub {
    font-size: 13px;
    color: #777;
    margin-bottom: 1rem;
    line-height: 1.6;
  }
  .erow { display: flex; gap: 8px; }
  .einput {
    flex: 1;
    padding: 11px 14px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    background: #fff;
    color: #1a1a1a;
    font-size: 14px;
    font-family: inherit;
  }
  .einput:focus { outline: none; border-color: #534AB7; }
  .ebtn {
    padding: 11px 20px;
    background: #534AB7;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .ebtn:hover { background: #3C3489; }
  .ebtn:disabled { opacity: 0.5; cursor: default; }
  .success-msg { font-size: 14px; color: #2e7d32; margin-top: 10px; }
  .error-msg { font-size: 13px; color: #c62828; margin-top: 8px; }
  .retake {
    font-size: 13px;
    color: #999;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: inherit;
  }
  @media (max-width: 480px) {
    .wrap { padding: 1.5rem 1.25rem; }
    .intro-title { font-size: 22px; }
    .erow { flex-direction: column; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
const Qs=[
{q:"What brings you here — to this quiz — right now?",opts:[
{t:"Curiosity. I'm skeptical but open.",v:1},
{t:"I'm exhausted and looking for an explanation that finally makes sense.",v:2},
{t:"I know something is broken but I can't quite name what it is — and I don't think it's just me.",v:3},
{t:"I'm already doing this work and want to find my people.",v:4}]},
{q:"When someone says \"the system is rigged,\" your first reaction is:",opts:[
{t:"That's a victim mentality. Anyone can succeed with hard work.",v:1},
{t:"Maybe — but I'm still trying to figure out what I'm doing wrong.",v:2},
{t:"Yes — especially capitalism, religion, or racism.",v:3},
{t:"Yes — and it goes deeper than capitalism, religion, and racism combined.",v:4}]},
{q:"When you think about your financial situation, which feels most true?",opts:[
{t:"I just need to make better choices and work harder.",v:1},
{t:"I'm doing everything right and still falling behind. I don't understand why.",v:2},
{t:"Capitalism is designed to keep people like me struggling.",v:3},
{t:"I'm done blaming myself for a rigged financial game. I want to understand how the system actually works so I can stop being its victim.",v:4}]},
{q:"You've followed all the advice — planners, gurus, self-help books. The result is:",opts:[
{t:"It works when I'm disciplined enough.",v:1},
{t:"I've tried everything and I'm more exhausted than when I started.",v:2},
{t:"None of it works — but there must be some answer out there.",v:3},
{t:"The advice was never designed for someone like me — so I stopped following it.",v:4}]},
{q:"When you hear \"patriarchy is the problem with society,\" you feel:",opts:[
{t:"Eye-roll. Here we go.",v:1},
{t:"Curious but unsure. I feel something but can't fully articulate it.",v:2},
{t:"Fired up. Finally someone naming what's actually wrong.",v:3},
{t:"Clear. It's the water we're all swimming in — and I am looking for what comes next.",v:4}]},
{q:"You work incredibly hard and still feel behind. Your inner voice says:",opts:[
{t:"I need more discipline. Less distraction.",v:1},
{t:"I'm so tired of trying. Something is broken but I don't know what.",v:2},
{t:"The economy or this industry is working against me.",v:3},
{t:"The race isn't set up for any of us to win. I'm ready to design what comes next.",v:4}]},
{q:"Which sentence would you most likely say out loud?",opts:[
{t:"I just need to stop making excuses and get my life together.",v:1},
{t:"I'm so tired of trying to figure out what's wrong with me.",v:2},
{t:"This whole system is corrupt and I'm furious about it.",v:3},
{t:"Once I started seeing the pattern, I couldn't unsee it.",v:4}]},
{q:"When you imagine the root cause of inequality, you point to:",opts:[
{t:"Poor choices and lack of personal responsibility.",v:1},
{t:"Something systemic — but I genuinely don't know how to name it yet.",v:2},
{t:"Capitalism. Or white supremacy. Or the church. Or all three.",v:3},
{t:"Patriarchy — it's the root cause of all of Western Society's ills.",v:4}]},
{q:"Your relationship with your own anger:",opts:[
{t:"I don't really feel angry. Anger is unproductive.",v:1},
{t:"I feel a low hum of rage I can't explain — and it scares me a little.",v:2},
{t:"I'm furious and I think that's completely justified.",v:3},
{t:"My anger is data. It's been pointing at something real — and I'm using it.",v:4}]},
{q:"Your relationship with religion or spirituality:",opts:[
{t:"Faith teaches personal responsibility. Your choices determine your life.",v:1},
{t:"I've drifted away but still carry a lot of guilt and confusion.",v:2},
{t:"Religion is a primary tool of oppression and I'm done with it.",v:3},
{t:"Religion is man creating god to justify his actions — but I see the human need for something bigger than ourselves.",v:4}]}
];

const Stages=[
{
range:[10,17],
name:"Personal Responsibility Is Key",
label:"Stage 1 of 4",
tagline:"You're still inside the system — and the system works hard to stay invisible to you.",
body:"You've worked hard. You've earned what you have. And you're probably tired of people blaming 'the system' for their own choices, failures, and lack. That's fair. And that's exactly how the system is designed — to keep people from seeing it as anything other than themselves. Yet something brought you here today. Don't you think that's worth following?",
cta:"",
footer:""
},
{
range:[18,25],
name:"The Awakening",
label:"Stage 2 of 4",
tagline:"Something is wrong. You can feel it. You just can't fully name it yet.",
body:"You've followed society's map exactly: gone to church, said the prayers, taken the courses, read the books. Tried the plans. Used the budget and personal finance tips. Listened to the experts. Yet somehow you're not just stuck — you're falling further and further behind. The worst part? You still wake up wondering what's wrong with you. Guilt, shame, bone-deep exhaustion is all you have to show for trying so gosh darn hard. Yet you spiral right into: is this just me? It cannot be just me. You sense there's something you're not seeing yet — something right on the tip of your tongue that you can't quite name.\n\nYour inner ping-pong game is valid — and you're just on the verge of seeing something most people never let themselves see.",
cta:"Are you ready to put the pieces together?",
footer:""
},
{
range:[26,33],
name:"The Pattern Seer",
label:"Stage 3 of 4",
tagline:"You can see the architecture. And you can't unsee it.",
body:"You've connected the dots from a 50,000 foot view. You understand that patriarchy isn't just about gender or racism — it's the underlying operating system that capitalism, organized religion, authoritarian politics, and more all run on. You see how the systems interlock and all lead back to patriarchy. You've stopped blaming yourself and started asking better questions. This stage comes with its own weight — seeing what others can't see yet can feel isolating. Seeing the weight of where we are can feel like too much. Where do you go from here?",
cta:"",
footer:"You're in the right place. Let's go deeper together."
},
{
range:[34,40],
name:"Co-Creator of What's Next",
label:"Stage 4 of 4",
tagline:"You're not just waking up — you're building the world that comes after.",
body:"You see the system clearly and you've stopped waiting for permission to do something about it. You're actively re-mythologizing — creating new stories, new structures, new ways of being in relationship with money, power, community, and yourself. You might also be helping others get here but don't have a systematic way to do that and wish there was. This work is hard and it can be lonely. Finding your people — other co-creators who are building alongside you — is what you crave. Not hashing the same patterns time and time again.",
cta:"Are you ready to help build what's next together?",
footer:"You're in the right place. Let's find your people."
}
];

function getStage(s){return Stages.find(x=>s>=x.range[0]&&s<=x.range[1])||Stages[Stages.length-1];}
let cur=0,ans=new Array(Qs.length).fill(null),view='intro';

function render(){
  const root=document.getElementById('root');
  window.scrollTo(0,0);
  if(view==='intro'){
    root.innerHTML=`<div class="wrap">
      <p class="brand">Holli McCormick · Deconstructing Patriarchy</p>
      <h1 class="intro-title">Are You Blaming Yourself for a Rigged Game?</h1>
      <p class="intro-sub">Take this 2-minute quiz to find out exactly where you are in understanding the invisible system behind your exhaustion — and what to do next.</p>
      <button class="start-btn" onclick="startQuiz()">Take the quiz →</button>
      <p class="tagline">10 questions · Instant results · It's not you. It's the system.</p>
    </div>`;
  } else if(view==='quiz'){
    const q=Qs[cur],sel=ans[cur],pct=Math.round((cur/Qs.length)*100);
    root.innerHTML=`<div class="wrap">
      <div class="prog-bg"><div class="prog-fill" style="width:${pct}%"></div></div>
      <p class="qlabel">Question ${cur+1} of ${Qs.length}</p>
      <p class="qtext">${q.q}</p>
      ${q.opts.map((o,i)=>`<button class="opt${sel===i?' sel':''}" onclick="pick(${i})">${o.t}</button>`).join('')}
      <div class="navrow">
        <button class="nbtn" onclick="back()" ${cur===0?'disabled':''}>← Back</button>
        <button class="nbtn pri" onclick="next()" ${sel===null?'disabled':''}>${cur===Qs.length-1?'See my result →':'Next →'}</button>
      </div>
    </div>`;
  } else if(view==='result'){
    const score=ans.reduce((s,a,i)=>s+(a!==null?Qs[i].opts[a].v:0),0);
    const st=getStage(score);
    const bodyParagraphs=st.body.split('\n\n').map(p=>`<p class="rbody">${p}</p>`).join('');
    root.innerHTML=`<div class="wrap">
      <span class="badge">${st.label}</span>
      <h2 class="rtitle">${st.name}</h2>
      <p class="rsub">"${st.tagline}"</p>
      ${bodyParagraphs}
      ${st.cta?`<p class="rcta">${st.cta}</p>`:''}
      ${st.footer?`<p class="rfooter">${st.footer}</p>`:''}
      <hr class="divider">
      <div class="esec">
        <p class="elabel">Want to go deeper?</p>
        <p class="esub">Get the free guide for your stage &mdash; plus Holli&#39;s weekly insights on the system hiding in plain sight.</p>
        <div class="erow" style="margin-top:1rem;">
          <input class="einput" type="email" id="ei" placeholder="Your email address" />
          <button class="ebtn" id="esbtn" onclick="sub()">Send it &rarr;</button>
        </div>
        <div id="ec"></div>
      </div>
      <button class="retake" onclick="retake()">&larr; Retake the quiz</button>
    </div>`;
  }
}

function startQuiz(){view='quiz';cur=0;render();}
function pick(i){ans[cur]=i;render();}
function back(){if(cur>0){cur--;render();}}
function next(){
  if(ans[cur]===null)return;
  if(cur===Qs.length-1){view='result';render();}
  else{cur++;render();}
}
function retake(){ans=new Array(Qs.length).fill(null);cur=0;view='intro';render();}
function sub(){
  var v=document.getElementById('ei').value;
  var c=document.getElementById('ec');
  if(!v||v.indexOf('@')===-1){c.innerHTML='<p class="error-msg">Please enter a valid email address.</p>';return;}
  var btn=document.getElementById('esbtn');
  btn.disabled=true;
  btn.textContent='Sending...';
  var score=ans.reduce(function(s,a,i){return s+(a!==null?Qs[i].opts[a].v:0);},0);
  var st=getStage(score);
  var stageField='stage-1-believer';
  if(st.range[0]===18) stageField='stage-2';
  if(st.range[0]===26) stageField='stage-3';
  if(st.range[0]===34) stageField='stage-4';
  var fd=new FormData();
  fd.append('email_address',v);
  fd.append('fields['+stageField+']','true');
  fetch('https://app.kit.com/forms/9557742/subscriptions',{method:'POST',body:fd})
  .then(function(){c.innerHTML='<p class="success-msg">&#10003; You\'re in! Check your inbox.</p>';document.getElementById('ei').disabled=true;})
  .catch(function(){c.innerHTML='<p class="success-msg">&#10003; You\'re in! Check your inbox.</p>';document.getElementById('ei').disabled=true;});
}
render();
</script>
</body>
</html>
